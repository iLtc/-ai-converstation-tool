server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the api service, stripping the /api prefix.
  location /api/ {
    proxy_pass http://api:8787/;
    proxy_set_header Host $host;
  }
}
